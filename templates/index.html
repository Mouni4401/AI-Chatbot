<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:         #08090d;
  --surface:    #0e1018;
  --card:       #13151f;
  --border:     #1e2130;
  --border2:    #2a2d45;
  --accent:     #6366f1;
  --accent2:    #818cf8;
  --text:       #e2e4f0;
  --muted:      #565a7a;
  --muted2:     #3a3d57;
  --user-bg:    #1a1b2e;
  --bot-bg:     #111320;
  --radius:     16px;
  --font-head:  'Syne', sans-serif;
  --font-body:  'DM Sans', sans-serif;
}

html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── Ambient background orbs ── */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:.35}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#4f46e5,transparent 70%);top:-120px;left:-80px}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#7c3aed,transparent 70%);bottom:-100px;right:-60px}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,#0ea5e9,transparent 70%);bottom:30%;left:10%;opacity:.18}

/* ── Main shell ── */
.shell{
  position:relative;z-index:1;
  width:100%;max-width:760px;height:96vh;
  display:flex;flex-direction:column;
  background:rgba(14,16,24,.85);
  backdrop-filter:blur(24px);
  border:1px solid var(--border2);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;
  border-bottom:1px solid var(--border);
  background:rgba(13,15,22,.7);
  flex-shrink:0;
}
.header-left{display:flex;align-items:center;gap:14px}
.logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#4f46e5,#818cf8);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  box-shadow:0 0 18px rgba(99,102,241,.4);
}
.header-title{font-family:var(--font-head);font-size:15px;font-weight:600;letter-spacing:.01em}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}

/* Persona pills */
.personas{display:flex;gap:6px;flex-wrap:wrap}
.persona-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--muted);font-family:var(--font-body);font-size:11px;font-weight:500;
  padding:5px 11px;border-radius:20px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:5px;
}
.persona-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.persona-btn.active{
  background:rgba(99,102,241,.15);
  border-color:var(--accent);color:var(--accent2);
  box-shadow:0 0 12px rgba(99,102,241,.2);
}

/* Clear btn */
.clear-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:var(--font-body);font-size:11px;
  padding:5px 12px;border-radius:8px;cursor:pointer;
  transition:all .2s;
}
.clear-btn:hover{border-color:#f87171;color:#f87171}

/* ── Message area ── */
#messages{
  flex:1;overflow-y:auto;
  padding:20px 18px;
  display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}

/* empty state */
.empty-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  color:var(--muted);pointer-events:none;
}
.empty-wrap .bigmoji{font-size:44px;margin-bottom:8px;filter:grayscale(.4)}
.empty-wrap h2{font-family:var(--font-head);font-size:18px;color:var(--text);font-weight:600}
.empty-wrap p{font-size:12px;opacity:.7}

/* suggestion chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px;pointer-events:all}
.chip{
  background:rgba(30,33,48,.8);border:1px solid var(--border2);
  color:var(--muted2 + 30);font-size:12px;
  padding:8px 14px;border-radius:20px;cursor:pointer;
  transition:all .2s;color:#8b8fa8;
}
.chip:hover{border-color:var(--accent);color:var(--accent2);background:rgba(99,102,241,.1)}

/* messages */
.msg-row{
  display:flex;gap:10px;
  animation:msgIn .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(10px) scale(.97)}
  to  {opacity:1;transform:translateY(0)   scale(1)}
}
.msg-row.user {align-self:flex-end;flex-direction:row-reverse;max-width:80%}
.msg-row.bot  {align-self:flex-start;max-width:82%}

.msg-avatar{
  width:28px;height:28px;min-width:28px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;margin-top:2px;
  border:1px solid var(--border2);
}
.msg-row.user .msg-avatar{background:rgba(99,102,241,.2)}
.msg-row.bot  .msg-avatar{background:rgba(30,33,48,.8)}

.msg-body{display:flex;flex-direction:column;gap:4px}
.msg-label{font-size:10px;color:var(--muted);padding:0 4px}
.msg-row.user .msg-label{text-align:right}

.bubble{
  padding:11px 15px;
  border-radius:var(--radius);
  font-size:13.5px;line-height:1.65;
  white-space:pre-wrap;
  word-break:break-word;
}
.msg-row.user .bubble{
  background:var(--user-bg);
  border:1px solid rgba(99,102,241,.25);
  border-bottom-right-radius:4px;
  color:#c7c9f0;
}
.msg-row.bot .bubble{
  background:var(--bot-bg);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.bubble.error{color:#f87171;border-color:rgba(248,113,113,.2);background:rgba(127,29,29,.15)}

/* code blocks inside bubbles */
.bubble code{
  background:rgba(255,255,255,.07);
  border-radius:5px;padding:2px 6px;
  font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;
}
.bubble pre{
  background:rgba(0,0,0,.4);border:1px solid var(--border2);
  border-radius:10px;padding:12px 14px;margin:8px 0;overflow-x:auto;
}
.bubble pre code{background:none;padding:0;font-size:12px}

/* typing dots */
.typing{display:flex;gap:5px;align-items:center;padding:4px 2px}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:dot 1.3s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* copy toast */
.copied-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#22c55e;color:#fff;font-size:12px;font-weight:500;
  padding:8px 18px;border-radius:20px;
  opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;
}
.copied-toast.show{opacity:1}

/* message actions (copy) */
.msg-actions{
  display:none;gap:6px;margin-top:4px;
}
.msg-row:hover .msg-actions{display:flex}
.msg-row.user .msg-actions{justify-content:flex-end}
.action-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:10px;padding:3px 9px;border-radius:8px;cursor:pointer;
  transition:all .2s;font-family:var(--font-body);
}
.action-btn:hover{border-color:var(--accent2);color:var(--accent2)}

/* counter badge */
.msg-counter{
  font-size:10px;color:var(--muted);
  background:rgba(30,33,48,.6);border:1px solid var(--border);
  padding:2px 8px;border-radius:10px;
}

/* ── Input row ── */
.input-area{
  padding:14px 18px 18px;
  border-top:1px solid var(--border);
  background:rgba(13,15,22,.7);
  flex-shrink:0;
}
.input-row{
  display:flex;gap:10px;align-items:flex-end;
}
.suggest-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--muted);font-size:11px;padding:0 12px;height:44px;
  border-radius:12px;cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:var(--font-body);flex-shrink:0;
}
.suggest-btn:hover{border-color:var(--accent2);color:var(--accent2)}

textarea#input{
  flex:1;
  background:rgba(8,9,13,.8);
  border:1px solid var(--border2);
  color:var(--text);
  border-radius:12px;
  padding:12px 16px;
  font-size:13.5px;
  font-family:var(--font-body);
  resize:none;outline:none;
  max-height:120px;min-height:44px;
  transition:border-color .2s;
  line-height:1.5;
}
textarea#input:focus{border-color:var(--accent)}
textarea#input::placeholder{color:var(--muted)}

.send-btn{
  width:44px;height:44px;min-width:44px;
  background:linear-gradient(135deg,#4f46e5,#818cf8);
  border:none;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s,transform .1s;
  box-shadow:0 0 18px rgba(99,102,241,.35);
}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{opacity:.4;cursor:default}
.send-btn svg{width:17px;height:17px;fill:white}

/* char counter */
.input-meta{
  display:flex;justify-content:flex-end;
  margin-top:6px;font-size:10px;color:var(--muted);
}

/* ── Scrollbar ── */
#messages::-webkit-scrollbar{width:5px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Responsive ── */
@media(max-width:600px){
  .shell{height:100vh;border-radius:0;border:none}
  .personas{display:none}
  .suggest-btn{display:none}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">✦</div>
      <div>
        <div class="header-title">AI Chat</div>
        <div class="header-sub" id="persona-label">Assistant mode</div>
      </div>
    </div>
    <div class="header-right">
      <div class="personas" id="personas">
        {% for key, p in personas.items() %}
        <button class="persona-btn {% if loop.first %}active{% endif %}"
                data-key="{{ key }}"
                style="--p-color: {{ p.color }};">
          {{ p.emoji }} {{ p.label }}
        </button>
        {% endfor %}
      </div>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>
  </header>

  <!-- MESSAGES -->
  <div id="messages">
    <div class="empty-wrap" id="emptyState">
      <div class="bigmoji" id="emptyEmoji">✦</div>
      <h2>Start a conversation</h2>
      <p>Pick a persona above, then say anything</p>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <button class="suggest-btn" id="suggestBtn">✦ Inspire me</button>
      <textarea id="input" rows="1" placeholder="Say something…"></textarea>
      <button class="send-btn" id="sendBtn" title="Send (Enter)">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-meta"><span id="charCount">0 / 800</span></div>
  </div>
</div>

<div class="copied-toast" id="toast">Copied!</div>

<script>
const personaButtons = document.querySelectorAll(".persona-btn");
const PERSONAS = Array.from(personaButtons).reduce((acc, btn) => {
  const [emoji, ...labelParts] = btn.textContent.trim().split(" ");
  acc[btn.dataset.key] = { emoji, label: labelParts.join(" ") };
  return acc;
}, {});

let currentPersona = document.querySelector(".persona-btn.active")?.dataset.key || "assistant";
let messageCount = 0;

const messagesEl = document.getElementById("messages");
const inputEl    = document.getElementById("input");
const sendBtn    = document.getElementById("sendBtn");
const clearBtn   = document.getElementById("clearBtn");
const suggestBtn = document.getElementById("suggestBtn");
const emptyState = document.getElementById("emptyState");
const charCount  = document.getElementById("charCount");
const toast      = document.getElementById("toast");
const personaLabel = document.getElementById("persona-label");
const emptyEmoji   = document.getElementById("emptyEmoji");

// ── Persona switching ──
document.getElementById("personas").addEventListener("click", e => {
  const btn = e.target.closest(".persona-btn");
  if (!btn) return;
  document.querySelectorAll(".persona-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentPersona = btn.dataset.key;
  const p = PERSONAS[currentPersona];
  personaLabel.textContent = p.label + " mode";
  emptyEmoji.textContent = p.emoji;
  loadChips();
});

// ── Suggestion chips ──
async function loadChips() {
  const res  = await fetch(`/suggest?persona=${currentPersona}`);
  const data = await res.json();
  const chips = document.getElementById("chips");
  if (!chips) return;
  chips.innerHTML = "";
  // Show 3 hard-coded + 1 fetched chip
  const suggestions = [data.suggestion];
  suggestions.forEach(s => {
    const chip = document.createElement("button");
    chip.className = "chip";
    chip.textContent = s;
    chip.onclick = () => { inputEl.value = s; inputEl.focus(); updateCharCount(); };
    chips.appendChild(chip);
  });
}
loadChips();

// ── Inspire me button ──
suggestBtn.addEventListener("click", async () => {
  suggestBtn.disabled = true;
  suggestBtn.textContent = "…";
  const res  = await fetch(`/suggest?persona=${currentPersona}`);
  const data = await res.json();
  inputEl.value = data.suggestion;
  inputEl.dispatchEvent(new Event("input"));
  inputEl.focus();
  suggestBtn.disabled = false;
  suggestBtn.textContent = "✦ Inspire me";
});

// ── Helpers ──
function hideEmpty() {
  if (emptyState) { emptyState.style.display = "none"; }
}

function updateCharCount() {
  const l = inputEl.value.length;
  charCount.textContent = `${l} / 800`;
  charCount.style.color = l > 700 ? "#f87171" : "var(--muted)";
}

function simpleMarkdown(text) {
  // Very lightweight: code blocks, inline code, bold
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showToast(msg = "Copied!") {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1800);
}

function appendMessage(role, html, isError = false, label = "") {
  hideEmpty();
  const p = PERSONAS[currentPersona];
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  const avatarEl = document.createElement("div");
  avatarEl.className = "msg-avatar";
  avatarEl.textContent = role === "user" ? "🧑" : p.emoji;

  const bodyEl = document.createElement("div");
  bodyEl.className = "msg-body";

  const lbl = document.createElement("div");
  lbl.className = "msg-label";
  lbl.textContent = label || (role === "user" ? "You" : p.label);
  bodyEl.appendChild(lbl);

  const bubble = document.createElement("div");
  bubble.className = "bubble" + (isError ? " error" : "");
  if (role === "bot" && !isError) {
    bubble.innerHTML = simpleMarkdown(html);
  } else {
    bubble.textContent = html;
  }
  bodyEl.appendChild(bubble);

  // Copy action
  const actions = document.createElement("div");
  actions.className = "msg-actions";
  const copyBtn = document.createElement("button");
  copyBtn.className = "action-btn";
  copyBtn.textContent = "Copy";
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(html).then(() => showToast("Copied!"));
  };
  actions.appendChild(copyBtn);
  bodyEl.appendChild(actions);

  row.appendChild(avatarEl);
  row.appendChild(bodyEl);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function showTyping() {
  hideEmpty();
  const p = PERSONAS[currentPersona];
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.id = "typing";
  row.innerHTML = `
    <div class="msg-avatar">${p.emoji}</div>
    <div class="msg-body">
      <div class="msg-label">${p.label}</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    </div>`;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  document.getElementById("typing")?.remove();
}

// ── Send ──
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  updateCharCount();
  appendMessage("user", text);
  showTyping();
  sendBtn.disabled = true;

  try {
    const res  = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, persona: currentPersona }),
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      appendMessage("bot", "⚠️ " + data.error, true);
    } else {
      appendMessage("bot", data.reply);
      messageCount = data.message_count || messageCount + 1;
    }
  } catch {
    removeTyping();
    appendMessage("bot", "Network error — is Flask running?", true);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ── Clear ──
clearBtn.addEventListener("click", async () => {
  await fetch("/clear", { method: "POST" });
  messagesEl.innerHTML = "";
  messageCount = 0;
  const es = document.createElement("div");
  es.className = "empty-wrap";
  es.id = "emptyState";
  const p = PERSONAS[currentPersona];
  es.innerHTML = `
    <div class="bigmoji" id="emptyEmoji">${p.emoji}</div>
    <h2>Start a conversation</h2>
    <p>Pick a persona above, then say anything</p>
    <div class="chips" id="chips"></div>`;
  messagesEl.appendChild(es);
  loadChips();
});

// ── Input events ──
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  updateCharCount();
});

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

sendBtn.addEventListener("click", sendMessage);
updateCharCount();
</script>
</body>
</html>
